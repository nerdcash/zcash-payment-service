services:
  zcash-payment-service:
    image: zcash-payment-service:${IMAGE_TAG:-local}
    build: .
    ports:
      - "127.0.0.1:8787:8787"
    environment:
      PORT: 8787
      APP_DATA_DIR: /data/zcash-payment
      ZCASH_NETWORK: ${ZCASH_NETWORK:-testnet}
      ZCASH_UIVK: ${ZCASH_UIVK:-}
      ZCASH_BIRTHDAY_HEIGHT: ${ZCASH_BIRTHDAY_HEIGHT:-}
      LIGHTWALLETD_URL: ${LIGHTWALLETD_URL:-}
      ZCASH_WEBHOOK_URL: ${ZCASH_WEBHOOK_URL:-}
      ZCASH_WEBHOOK_SECRET: ${ZCASH_WEBHOOK_SECRET:-}
    volumes:
      - ./data:/data/zcash-payment
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8787/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
